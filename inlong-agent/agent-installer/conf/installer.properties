#######################
#   common config
#######################
agent.local.ip=127.0.0.1
agent.enable.oom.exit=false

############################
# manager config
############################
agent.manager.addr=http://127.0.0.1:8083
agent.manager.auth.secretId=
agent.manager.auth.secretKey=

############################
# cluster config for automatically report and register
############################
agent.cluster.tag=default_cluster
agent.cluster.name=default_agent

############################
# audit config
############################
# whether to enable audit
audit.enable=true

############################
# command security: extra allowed root directories
# Write commands (rm, cp, mv, mkdir, ln, chmod, chown, tar, unzip) can only operate
# on paths within built-in roots: $user.home/inlong, $user.home/inlong-agent,
# agent.home, $java.io.tmpdir. Append comma-separated paths for custom deployments.
# installer.command.extraAllowedRoots=/opt/inlong,/data/inlong
############################

############################
# command security: extra argv[0] whitelist commands
# Built-in whitelist: cd, sh, bash, ps, grep, awk, kill, rm, mkdir, cp, mv, ln, tar,
#   unzip, chmod, chown, echo, cat, test, [, true, false, java.
# Append comma-separated command names. Entries with whitespace, path separators, or
# shell metacharacters (; | & > < $ ` / \) are rejected with a WARN.
# installer.command.extraCommandWhitelist=nohup,python3
############################

############################
# command security: extra write-like commands subject to allowed-root checks
# Built-in set: rm, cp, mv, mkdir, ln, chmod, chown, tar, unzip.
# Append comma-separated command names. The command must also be present in the
# whitelist (built-in + extra); otherwise only a WARN is logged and the check is
# skipped.
# installer.command.extraWriteLikeCommands=dd,truncate